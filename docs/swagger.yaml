    get:
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Step ID
        in: path
        name: step_id
        required: true
        type: string
      - description: Item ID
        in: path
        name: id
        required: true
        type: string
      produces:
