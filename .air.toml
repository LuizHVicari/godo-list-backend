root = "."
tmp_dir = "tmp"

[build]
    cmd = "go build -o ./tmp/api ./cmd/api/main.go"
    bin = "./tmp/api"
    full_bin = "./tmp/api -port ${SERVER_PORT:-8080}"
    include_ext = ["go", "tpl", "tmpl", "html", "env"]
    exclude_dir = ["tmp", "bin", "vendor", ".git"]
    delay = 300
    stop_on_error = true

[log]
    time = true

[color]
    main = "magenta"
    watcher = "cyan"
    build = "yellow"
    runner = "green"

[misc]
    clean_on_exit = true
