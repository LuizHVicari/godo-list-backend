name: Build and Publish Binary

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string

jobs:
  build-and-publish-binary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/api cmd/api/main.go

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_prefix }}-${{ github.sha }}
          name: ${{ inputs.environment == 'prod' && 'Production' || 'Development' }} ${{ inputs.tag_prefix }}-${{ github.sha }}
          prerelease: ${{ inputs.environment != 'prod' }}
          make_latest: ${{ inputs.environment == 'prod' }}
          files: bin/api
